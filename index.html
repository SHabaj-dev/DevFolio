                inset 4px 4px 8px rgba(255, 255, 255, 0.8),

        /* Animated Entrance & Floating */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .animate-float {
            animation: float 4s ease-in-out infinite;
        }

        @keyframes scaleUp {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .animate-entrance {
            animation: scaleUp 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        /* Splash Exit Animation */
        .splash-exit {
            transition: all 1s cubic-bezier(0.4, 0, 0.2, 1);

<!-- Interactive Background Particles -->
<canvas class="absolute inset-0 pointer-events-none" id="particleCanvas"></canvas>
<script>
        // Particle System
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 3 + 1;
                this.speedX = Math.random() * 0.4 - 0.2;
                this.speedY = Math.random() * 0.4 - 0.2;
                this.alpha = Math.random() * 0.3 + 0.1;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) {
                    this.reset();
                }
            }
            draw() {
                ctx.fillStyle = `rgba(0, 109, 59, ${this.alpha})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initParticles() {
            for (let i = 0; i < 35; i++) {
                particles.push(new Particle());
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animateParticles);
        }

        initParticles();
        animateParticles();

        // Gradle Sync Simulation
        const statuses = [
            { text: "Initializing Project...", threshold: 0 },
            { text: "Downloading Dependencies...", threshold: 25 },
            { text: "Syncing Gradle...", threshold: 50 },
            { text: "Building Modules...", threshold: 75 },
            { text: "Ready to Launch...", threshold: 95 }
        ];

        let progress = 0;
        const progressBar = document.getElementById('progressBar');
        const syncStatus = document.getElementById('syncStatus');
        const syncPercent = document.getElementById('syncPercent');
        const contentWrapper = document.getElementById('contentWrapper');

        function updateProgress() {
            if (progress < 100) {
                // Non-linear progress increment for a more "realistic" feel
                const increment = Math.random() * 1.5 + 0.5;
                progress = Math.min(100, progress + increment);
                
                progressBar.style.width = `${progress}%`;
                syncPercent.innerText = `${Math.floor(progress)}%`;

                // Update status message
                const currentStatus = statuses.slice().reverse().find(s => progress >= s.threshold);
                if (currentStatus && syncStatus.innerText !== currentStatus.text) {
                    syncStatus.style.opacity = '0';
                    setTimeout(() => {
                        syncStatus.innerText = currentStatus.text;
                        syncStatus.style.opacity = '1';
                    }, 150);
                }

                requestAnimationFrame(updateProgress);
            } else {
                // Completed Transition
                setTimeout(triggerExit, 600);
            }
        }

        function triggerExit() {
            contentWrapper.classList.add('splash-exit');
            // Mock background transition to indicate "Home"
            document.getElementById('mainBody').classList.replace('bg-background', 'bg-surface-container-lowest');
            
            // In a real app, you would redirect here:
            // window.location.href = 'home.html';
            console.log("Navigation simulation started...");
        }

        // Start the sync after a small delay
        setTimeout(updateProgress, 800);
    </script>
