# =============================================================================
# quality.yml — DevFolio Quality Pipeline
# =============================================================================
# Runs on every push to main and every pull request targeting main.
# Fails fast so broken code never reaches main silently.
#
# Steps:
#   1. Compile check  (assembleDebug)
#   2. Static analysis (lintDebug)
#   3. Unit tests      (test)
#   4. Upload reports as artifacts
# =============================================================================

name: Quality Checks

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Cancel in-progress runs for the same branch to save CI minutes
concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Build · Lint · Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout
      # -----------------------------------------------------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 2. Java toolchain
      # -----------------------------------------------------------------------
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      # -----------------------------------------------------------------------
      # 3. Gradle cache — dramatically speeds up subsequent runs
      # -----------------------------------------------------------------------
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # -----------------------------------------------------------------------
      # 4. Grant Gradlew execute permission
      # -----------------------------------------------------------------------
      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # -----------------------------------------------------------------------
      # 5. Compile check — catches syntax/type errors fast
      # -----------------------------------------------------------------------
      - name: Compile (assembleDebug)
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # -----------------------------------------------------------------------
      # 6. Lint — static analysis
      #    Note: --no-configuration-cache avoids a known AGP + config-cache
      #    conflict with the lint task on the CI runner.
      # -----------------------------------------------------------------------
      - name: Lint (lintDebug)
        run: ./gradlew lintDebug --no-daemon --no-configuration-cache --stacktrace

      # -----------------------------------------------------------------------
      # 7. Unit tests
      # -----------------------------------------------------------------------
      - name: Unit Tests
        run: ./gradlew test --no-daemon --stacktrace

      # -----------------------------------------------------------------------
      # 8. Upload lint report (always — even on failure — so you can inspect it)
      # -----------------------------------------------------------------------
      - name: Upload Lint Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report-${{ github.run_number }}
          path: |
            app/reports/lint-results.xml
            app/reports/lint-results.html
          retention-days: 14

      # -----------------------------------------------------------------------
      # 9. Upload test results
      # -----------------------------------------------------------------------
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_number }}
          path: app/build/reports/tests/
          retention-days: 14
